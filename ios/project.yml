name: DateNight
options:
  bundleIdPrefix: com.tron
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

configFiles:
  Debug: Secrets.xcconfig
  Release: Secrets.xcconfig

packages:
  SwiftAnthropic:
    url: https://github.com/jamesrochabrun/SwiftAnthropic
    from: "1.0.0"
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"

targets:
  DateNight:
    type: application
    platform: iOS
    sources:
      - path: DateNight
        excludes:
          - "**/.DS_Store"
    dependencies:
      - package: SwiftAnthropic
      - package: Supabase
        products:
          - Supabase
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tron.datenight
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        VERSIONING_SYSTEM: "apple-generic"
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: YES
        DEVELOPMENT_TEAM: L6JNH6A9TS
        # AIProxy configuration (get from https://aiproxy.pro dashboard)
        AIPROXY_PARTIAL_KEY: $(AIPROXY_PARTIAL_KEY)
        AIPROXY_SERVICE_URL: $(AIPROXY_SERVICE_URL)
        # Direct API key (for development)
        ANTHROPIC_API_KEY: $(ANTHROPIC_API_KEY)
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: "Apple Development"
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "iPhone Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "match AppStore com.tron.datenight"
    info:
      path: DateNight/Info.plist
      properties:
        # AIProxy credentials for SwiftAnthropic
        AIPROXY_PARTIAL_KEY: $(AIPROXY_PARTIAL_KEY)
        AIPROXY_SERVICE_URL: $(AIPROXY_SERVICE_URL)
        # Direct API key (development)
        ANTHROPIC_API_KEY: $(ANTHROPIC_API_KEY)
        # Supabase
        SUPABASE_URL: $(SUPABASE_URL)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true

schemes:
  DateNight:
    build:
      targets:
        DateNight: all
    run:
      config: Debug
      environmentVariables:
        # DeviceCheck bypass for iOS Simulator (required for AIProxy)
        AIPROXY_DEVICE_CHECK_BYPASS: $(AIPROXY_DEVICE_CHECK_BYPASS)
    profile:
      config: Release
    archive:
      config: Release
